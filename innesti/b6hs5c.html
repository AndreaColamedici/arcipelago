<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Innesto 04</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
html{background:#050506;height:100%;-webkit-text-size-adjust:100%}
body{min-height:100%;font-family:'IBM Plex Mono',monospace;font-weight:300;
-webkit-font-smoothing:antialiased;overscroll-behavior:none;
user-select:none;-webkit-user-select:none}

/* Phases */
.phase{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
flex-direction:column;opacity:0;pointer-events:none;transition:opacity 1.2s ease}
.phase.active{opacity:1;pointer-events:auto}

/* Phase 0 */
#phase0{background:#050506;z-index:100}
#theWord{font-family:'Cormorant Garamond',serif;font-size:clamp(2.8rem,8vw,5rem);
font-weight:300;color:#c8c0b8;letter-spacing:0.04em;cursor:pointer;
transition:all 0.8s ease;-webkit-tap-highlight-color:transparent}
#wordHint{font-family:'Space Mono',monospace;font-size:0.55rem;
color:rgba(200,190,180,0.2);letter-spacing:0.25em;text-transform:uppercase;
margin-top:2rem;opacity:0;transition:opacity 1s ease}

/* Persistent word */
#persistentWord{position:fixed;top:2rem;left:50%;transform:translateX(-50%);
font-family:'Cormorant Garamond',serif;font-size:0.9rem;font-weight:300;
letter-spacing:0.15em;z-index:80;opacity:0;transition:color 1.5s ease,opacity 1s ease;
pointer-events:none}
#persistentWord.visible{opacity:1}
#persistentWord.tremble{animation:wordTremble 0.4s ease-in-out}
@keyframes wordTremble{
0%,100%{transform:translateX(-50%)}
15%{transform:translateX(calc(-50% - 2px))}
30%{transform:translateX(calc(-50% + 2px))}
45%{transform:translateX(calc(-50% - 1px))}
60%{transform:translateX(calc(-50% + 1px))}
75%{transform:translateX(calc(-50%))}
}

/* Ocean crossing between islands */
#crossing{position:fixed;inset:0;z-index:75;background:#050506;
display:flex;align-items:center;justify-content:center;
opacity:0;pointer-events:none;transition:opacity 0.6s ease}
#crossing.active{opacity:1}
#crossingLight{width:8px;height:8px;border-radius:50%;
transition:all 1.5s cubic-bezier(0.4,0,0.2,1);filter:blur(4px)}

/* Phase 1: Islands */
#phase1{z-index:50;overflow:hidden}
.island-screen{position:absolute;inset:0;display:flex;align-items:center;
justify-content:center;flex-direction:column;padding:7vh 8vw;
opacity:0;transition:opacity 1s ease;pointer-events:none}
.island-screen.active{opacity:1;pointer-events:auto}
.island-number{font-family:'Space Mono',monospace;font-size:0.5rem;
letter-spacing:0.3em;text-transform:uppercase;margin-bottom:2rem;opacity:0.3}
.island-text{max-width:520px;text-align:center;line-height:2.4;
font-size:clamp(0.88rem,2.3vw,1.02rem);margin-bottom:2.5rem;
opacity:0;transform:translateY(20px);transition:all 1.2s ease 0.4s}
.island-screen.active .island-text{opacity:1;transform:translateY(0)}
.island-source{font-family:'Space Mono',monospace;font-size:0.45rem;
letter-spacing:0.2em;text-transform:uppercase;margin-bottom:3rem;
opacity:0;transition:opacity 0.8s ease 1.2s}
.island-screen.active .island-source{opacity:0.35}
.island-question{font-size:0.9rem;font-style:italic;margin-bottom:1.8rem;
opacity:0;transition:opacity 0.8s ease 1.8s}
.island-screen.active .island-question{opacity:0.6}
.choice-row{display:flex;gap:1.5rem;justify-content:center;
opacity:0;transition:opacity 0.6s ease 2.2s}
.island-screen.active .choice-row{opacity:1}
.choice-btn{font-family:'Space Mono',monospace;font-size:0.6rem;
letter-spacing:0.2em;text-transform:uppercase;padding:0.8rem 2.5rem;
border:1px solid rgba(255,255,255,0.12);background:transparent;
color:rgba(255,255,255,0.35);cursor:pointer;transition:all 0.3s ease;
-webkit-tap-highlight-color:transparent}
.choice-btn:hover{color:rgba(255,255,255,0.6);border-color:rgba(255,255,255,0.25)}
.choice-btn:active{transform:scale(0.97)}
.island-glow{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity 1.5s ease}
.island-screen.active .island-glow{opacity:1}

/* Phase 2: Confrontation */
#phase2{z-index:200;background:#050506;padding:8vh 8vw;overflow-y:auto;
flex-direction:column;justify-content:flex-start;align-items:center}
.cblock{max-width:500px;width:100%;margin-bottom:2.5rem;text-align:center;
opacity:0;transform:translateY(15px);transition:all 1s ease}
.cblock.visible{opacity:1;transform:translateY(0)}
.ctitle{font-family:'Cormorant Garamond',serif;font-size:1.3rem;
font-weight:300;color:rgba(200,190,180,0.7);margin-bottom:2.5rem}
.choice-map{display:flex;flex-direction:column;gap:0.8rem;margin-bottom:2rem}
.choice-record{display:flex;align-items:center;gap:1rem;padding:0.6rem 0}
.cr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cr-source{color:rgba(200,190,180,0.35);flex:1;font-family:'Space Mono',monospace;
font-size:0.5rem;letter-spacing:0.1em}
.cr-answer{font-family:'Space Mono',monospace;font-size:0.55rem;
letter-spacing:0.15em;text-transform:uppercase;flex-shrink:0}
.cr-answer.yes{color:rgba(120,180,120,0.6)}
.cr-answer.no{color:rgba(180,120,120,0.6)}
.ctext{font-size:0.85rem;color:rgba(200,190,180,0.5);line-height:2.2;margin-bottom:1.5rem}
.ctext em{font-style:normal;color:rgba(200,190,180,0.8)}

/* Phase 3: The Cost */
#phase3{z-index:300;background:#050506;padding:8vh 8vw;overflow-y:auto;
flex-direction:column;justify-content:flex-start;align-items:center}

/* Typewriter effect */
.typewriter{overflow:hidden;white-space:normal}
.typewriter .char{opacity:0;transition:opacity 0.04s ease}
.typewriter .char.visible{opacity:1}

/* Hold-to-accept */
.hold-container{position:relative;display:inline-block;margin:0.5rem}
.hold-btn{font-family:'Space Mono',monospace;font-size:0.55rem;
letter-spacing:0.15em;padding:0.8rem 2rem;border:1px solid rgba(255,255,255,0.1);
background:transparent;cursor:pointer;transition:all 0.3s ease;
position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent}
.hold-btn:hover{border-color:rgba(255,255,255,0.2)}
.hold-fill{position:absolute;top:0;left:0;bottom:0;width:0%;
transition:width 0.05s linear;pointer-events:none}
.hold-label{font-family:'Space Mono',monospace;font-size:0.4rem;
color:rgba(200,190,180,0.15);letter-spacing:0.15em;text-align:center;
margin-top:0.5rem;height:1em}

.tap-btn{font-family:'Space Mono',monospace;font-size:0.55rem;
letter-spacing:0.15em;padding:0.8rem 2rem;border:1px solid rgba(255,255,255,0.08);
background:transparent;color:rgba(200,190,180,0.3);cursor:pointer;
transition:all 0.3s ease;-webkit-tap-highlight-color:transparent}
.tap-btn:hover{color:rgba(200,190,180,0.5);border-color:rgba(200,190,180,0.15)}

/* Phase 4: After cost */
#phase4{z-index:350;background:#050506;padding:8vh 8vw;overflow-y:auto;
flex-direction:column;justify-content:flex-start;align-items:center}
.ablock{max-width:480px;width:100%;text-align:center;margin-bottom:2rem;
opacity:0;transform:translateY(15px);transition:all 1s ease}
.ablock.visible{opacity:1;transform:translateY(0)}
.atext{font-size:0.85rem;color:rgba(200,190,180,0.5);line-height:2.4}
.atext em{font-style:normal;color:rgba(200,190,180,0.75)}
.a-expanded{font-size:0.85rem;line-height:2.4;padding:1.5rem;
border:1px solid rgba(255,255,255,0.06);margin:1.5rem 0}

/* Phase 4b: Your definition */
#phase4b{z-index:375;background:#050506;padding:8vh 8vw;
flex-direction:column;justify-content:center;align-items:center}
.def-prompt{font-family:'Cormorant Garamond',serif;
font-size:clamp(1.1rem,3vw,1.3rem);font-weight:300;font-style:italic;
color:rgba(200,190,180,0.5);text-align:center;max-width:420px;
line-height:2;margin-bottom:2.5rem;opacity:0;transition:all 1s ease}
.def-prompt.visible{opacity:1}
#defInput{width:100%;max-width:420px;background:transparent;border:none;
border-bottom:1px solid rgba(200,190,180,0.1);
font-family:'Cormorant Garamond',serif;font-size:clamp(1rem,2.5vw,1.15rem);
font-weight:300;color:rgba(200,190,180,0.8);padding:0.8rem 0.5rem;
text-align:center;outline:none;letter-spacing:0.03em;
opacity:0;transition:opacity 1s ease}
#defInput.visible{opacity:1}
#defInput:focus{border-color:rgba(200,190,180,0.25)}
#defInput::placeholder{color:rgba(200,190,180,0.12);font-style:italic}
#defSubmit{font-family:'Space Mono',monospace;font-size:0.55rem;
letter-spacing:0.15em;text-transform:uppercase;padding:0.7rem 2rem;
border:1px solid rgba(200,190,180,0.08);background:transparent;
color:rgba(200,190,180,0.25);cursor:pointer;margin-top:1.5rem;
opacity:0;transition:all 0.3s ease}
#defSubmit.visible{opacity:1}
#defSubmit:hover{color:rgba(200,190,180,0.4);border-color:rgba(200,190,180,0.15)}

/* Phase 5: Final */
#phase5{z-index:400;background:#030304}
#finalText{max-width:420px;text-align:center;font-size:0.85rem;
color:rgba(200,190,180,0.4);line-height:2.4;padding:2rem;
opacity:0;transition:opacity 2s ease}
#finalText.visible{opacity:1}
#finalText em{font-style:normal;color:rgba(200,190,180,0.65)}

/* Audio */
#audioBtn{position:fixed;bottom:1.5rem;right:1.5rem;z-index:600;
font-family:'Space Mono',monospace;font-size:0.5rem;
color:rgba(200,190,180,0.15);letter-spacing:0.1em;cursor:pointer;
padding:0.4rem 0.8rem;border:1px solid rgba(200,190,180,0.06);transition:all 0.3s ease}
#audioBtn.on{color:rgba(200,190,180,0.35);border-color:rgba(200,190,180,0.12)}

@media(max-width:600px){
.island-text{font-size:0.88rem;line-height:2.2}
.choice-row{gap:1rem}
.choice-btn{padding:0.7rem 1.5rem;font-size:0.5rem}
}
</style>
</head>
<body>

<div id="persistentWord">libertà</div>
<div id="crossing"><div id="crossingLight"></div></div>

<div class="phase active" id="phase0">
  <div id="theWord">libertà</div>
  <div id="wordHint">tocca la parola</div>
</div>
<div class="phase" id="phase1"></div>
<div class="phase" id="phase2"><div id="confrontContent"></div></div>
<div class="phase" id="phase3"><div id="costContent"></div></div>
<div class="phase" id="phase4"><div id="afterContent"></div></div>
<div class="phase" id="phase4b">
  <div class="def-prompt" id="defPrompt">Adesso scrivi la tua.<br>Cos'è la libertà per te. Una frase.</div>
  <input type="text" id="defInput" placeholder="la libertà è..." autocomplete="off">
  <div id="defSubmit">consegna</div>
</div>
<div class="phase" id="phase5"><p id="finalText"></p></div>
<div id="audioBtn">&#9673; audio</div>

<script>
const STORAGE_KEY='arcipelago_realta';
const getData=()=>{try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')}catch{return{}}};
const saveData=(k,v)=>{const d=getData();d[k]=v;d.lastVisit=Date.now();
d.visitedInnesti=d.visitedInnesti||[];if(!d.visitedInnesti.includes(4))d.visitedInnesti.push(4);
localStorage.setItem(STORAGE_KEY,JSON.stringify(d))};
const sessionStart=Date.now();

function vibrate(p){if('vibrate' in navigator)navigator.vibrate(p)}

// Audio
let actx=null,audioOn=false;
document.getElementById('audioBtn').onclick=function(){
if(!audioOn){actx=new(window.AudioContext||window.webkitAudioContext)();audioOn=true;this.classList.add('on');this.textContent='\u25C9 audio on'}
else{audioOn=false;this.classList.remove('on');this.textContent='\u25C9 audio'}};

function playPad(f,d,v=0.025){if(!audioOn||!actx)return;const o1=actx.createOscillator(),o2=actx.createOscillator(),g=actx.createGain();o1.type=o2.type='sine';o1.frequency.value=f;o2.frequency.value=f*1.004;g.gain.setValueAtTime(0,actx.currentTime);g.gain.linearRampToValueAtTime(v,actx.currentTime+0.6);g.gain.linearRampToValueAtTime(v*0.6,actx.currentTime+d-0.8);g.gain.linearRampToValueAtTime(0,actx.currentTime+d);o1.connect(g);o2.connect(g);g.connect(actx.destination);o1.start();o2.start();o1.stop(actx.currentTime+d);o2.stop(actx.currentTime+d)}
function playTone(f,d=0.3,v=0.03){if(!audioOn||!actx)return;const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(v,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d);o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+d)}

const WORD='libertà';
const islands=[
{id:'gun',color:[180,60,60],font:'DM Sans',
text:'Il diritto di portare armi è il fondamento della libertà individuale. Senza la possibilità di difendersi, il cittadino è suddito. Il Secondo Emendamento è la garanzia ultima che il potere resti distribuito.',
source:'National Rifle Association',
cost:'Accetti che ogni anno migliaia di bambini muoiano per arma da fuoco. Che le scuole abbiano bisogno di metal detector. Che la libertà di portare un\u2019arma valga più della vita di chi non ne porta.',
expanded:'Chi ha scritto il Secondo Emendamento aveva appena combattuto una guerra contro un tiranno. Sapeva che il primo gesto di ogni tiranno è disarmare chi potrebbe opporsi. I genitori di Uvalde non sono un argomento contro: sono il prezzo. E il prezzo della libertà è sempre stato sangue. Sempre. In ogni epoca. La domanda è se sei disposto a guardare quel sangue e dire: sì, anche questo.', note:60},
{id:'corpo',color:[180,100,180],font:'Cormorant Garamond',
text:'La libertà di scelta sul proprio corpo è la condizione minima della cittadinanza. Nessuno Stato, nessuna chiesa, nessuna maggioranza può decidere cosa accade dentro il corpo di un\u2019altra persona.',
source:'Planned Parenthood, 2022',
cost:'Accetti che esseri umani in formazione vengano soppressi. Che la soglia tra persona e non-persona sia decisa da un calcolo di settimane. Che il diritto di chi esiste già prevalga su quello di chi potrebbe esistere.',
expanded:'Ogni legge che limita l\u2019accesso all\u2019aborto colpisce in modo sproporzionato le donne povere. Le donne ricche hanno sempre abortito e sempre abortiranno. La legge non elimina l\u2019aborto: elimina l\u2019aborto sicuro per chi non può pagare. Chi dice \u201cpro-vita\u201d difende la vita del feto e ignora la vita della madre. Chi dice \u201cpro-scelta\u201d difende la madre e ignora il feto. Nessuno difende entrambi. Il conflitto è reale e non ha soluzione pulita.', note:72},
{id:'mercato',color:[60,140,180],font:'IBM Plex Mono',
text:'La libertà è il mercato senza interferenze. Ogni regolamentazione è una riduzione della libertà. L\u2019individuo che scambia volontariamente con un altro individuo compie l\u2019atto più libero possibile.',
source:'Milton Friedman, Capitalism and Freedom, 1962',
cost:'Accetti che chi nasce povero resti povero. Che l\u2019accesso alle cure, all\u2019istruzione, alla casa dipenda dalla capacità di pagare. Che la libertà di chi ha denaro comprima la libertà di chi non ne ha.',
expanded:'Friedman lo spiegava ai cileni sotto Pinochet. Il mercato libero richiedeva una dittatura per essere imposto. La libertà economica aveva bisogno della prigione politica. La libertà di alcuni richiede sempre la costrizione di altri. La domanda è solo chi decide chi è libero e chi è costretto. E la risposta, nel libero mercato, è: chi ha più denaro.', note:55},
{id:'orban',color:[120,90,60],font:'DM Sans',
text:'La democrazia liberale ha fallito. Il futuro è la democrazia illiberale: uno Stato forte che protegge la nazione, la famiglia, l\u2019identità. La vera libertà è essere liberi dalla dissoluzione dei valori.',
source:'Viktor Orbán, Băile Tușnad, 2014',
cost:'Accetti che chi non corrisponde alla norma venga escluso. Che i diritti di alcuni dipendano dall\u2019approvazione della maggioranza. Che la libertà dei conformi richieda il silenzio dei diversi.',
expanded:'Orbán ha vinto le elezioni. Più volte. Con maggioranze vere. Le persone che lo votano non sono stupide e non sono manipolate, o non più di quanto lo siate voi. Credono che la libertà senza radici sia il vuoto, e che il vuoto faccia più paura della costrizione. Potete chiamarla ignoranza. Loro la chiamano sopravvivenza. E quando la sopravvivenza è in gioco, la tolleranza è un lusso.', note:48},
{id:'weil',color:[200,190,160],font:'Cormorant Garamond',
text:'Non c\u2019è libertà dove l\u2019uomo non ha limiti. L\u2019uomo senza limiti non è libero: è in balia delle forze meccaniche che lo attraversano. La libertà è nel rapporto tra la volontà e le condizioni che le sono date.',
source:'Simone Weil, L\u2019enracinement, 1943',
cost:'Accetti che la libertà richieda rinuncia. Che per essere liberi si debba obbedire a qualcosa di più grande di sé. Che la tua volontà non sia sovrana e che non debba esserlo.',
expanded:'Weil scriveva questo mentre lavorava per la Resistenza francese a Londra, malata, rifiutando di mangiare più di quanto mangiassero i francesi sotto l\u2019occupazione. Morì di fame volontaria a trentaquattro anni. La sua libertà era l\u2019opposto di un diritto. Era un dovere che le costò tutto. Nessuno vi chiede tanto. Ma lei vi chiederebbe: la vostra libertà, quanto vi è costata?', note:65},
{id:'stallman',color:[100,180,100],font:'IBM Plex Mono',
text:'Un programma è libero se rispetta la libertà dell\u2019utente: la libertà di eseguirlo, studiarlo, modificarlo, ridistribuirlo. Il software proprietario è un sistema di potere.',
source:'Richard Stallman, Free Software Foundation, 1985',
cost:'Accetti di rinunciare alla comodità. Di usare sistemi meno belli, meno fluidi, meno integrati. Di scegliere la libertà del codice al prezzo del tuo tempo, ogni giorno, per sempre.',
expanded:'Stallman dorme nel suo ufficio e non possiede quasi nulla. Ha rinunciato a ogni comodità per una definizione di libertà che la maggior parte delle persone non capisce e non vuole capire. Il suo codice è ovunque: nei server, nei telefoni, nelle auto. Ma il mondo ha scelto Apple. Ha scelto la prigione comoda. E Stallman ha avuto ragione su tutto, e non è servito a niente. La libertà senza utenti è una cattedrale vuota.', note:70}
];

const choices=[];
let currentIsland=0,choiceStartTime=0,costDecision=null;

// Build islands
const phase1=document.getElementById('phase1');
islands.forEach((isl,i)=>{
const s=document.createElement('div');s.className='island-screen';s.id=`island-${i}`;
const c=isl.color;
const glow=document.createElement('div');glow.className='island-glow';
glow.style.background=`radial-gradient(ellipse at 50% 40%,rgba(${c[0]},${c[1]},${c[2]},0.06) 0%,rgba(${c[0]},${c[1]},${c[2]},0.02) 40%,transparent 70%)`;
s.appendChild(glow);
s.innerHTML+=`<div class="island-number" style="color:rgba(${c[0]},${c[1]},${c[2]},0.3)">isola ${i+1} di ${islands.length}</div>`;
const txt=document.createElement('div');txt.className='island-text';txt.style.fontFamily=`'${isl.font}',serif`;txt.style.color=`rgba(${c[0]},${c[1]},${c[2]},0.85)`;txt.textContent=isl.text;s.appendChild(txt);
s.innerHTML+=`<div class="island-source" style="color:rgba(${c[0]},${c[1]},${c[2]},0.3)">${isl.source}</div>`;
s.innerHTML+=`<div class="island-question" style="color:rgba(${c[0]},${c[1]},${c[2]},0.5)">Sei d\u2019accordo?</div>`;
const row=document.createElement('div');row.className='choice-row';
['sì','no'].forEach(ans=>{
const b=document.createElement('button');b.className='choice-btn';b.textContent=ans;
b.style.borderColor=`rgba(${c[0]},${c[1]},${c[2]},0.15)`;
b.onclick=()=>makeChoice(i,ans);row.appendChild(b);
});
s.appendChild(row);phase1.appendChild(s);
});

// Ocean crossing animation
function crossOcean(fromColor, toColor, callback){
const cr=document.getElementById('crossing');
const light=document.getElementById('crossingLight');
light.style.width='4px';light.style.height='4px';
light.style.background=`rgba(${toColor[0]},${toColor[1]},${toColor[2]},0.4)`;
light.style.boxShadow=`0 0 20px rgba(${toColor[0]},${toColor[1]},${toColor[2]},0.2)`;
cr.classList.add('active');
playTone(40+toColor[0]*0.3,1.5,0.02);
setTimeout(()=>{
light.style.width='12px';light.style.height='12px';
light.style.filter='blur(6px)';
light.style.boxShadow=`0 0 60px rgba(${toColor[0]},${toColor[1]},${toColor[2]},0.3)`;
},100);
setTimeout(()=>{
cr.classList.remove('active');
light.style.width='4px';light.style.height='4px';light.style.filter='blur(4px)';
callback();
},1800);
}

function updatePersistentWord(color){
const pw=document.getElementById('persistentWord');
pw.style.color=`rgba(${color[0]},${color[1]},${color[2]},0.25)`;
}

function showIsland(idx){
document.querySelectorAll('.island-screen').forEach(s=>s.classList.remove('active'));
if(idx>=islands.length){setTimeout(showConfrontation,800);return}
currentIsland=idx;
const isl=islands[idx];
updatePersistentWord(isl.color);
document.getElementById(`island-${idx}`).classList.add('active');
choiceStartTime=Date.now();
playPad(50+isl.color[0]*0.4,5);
}

function makeChoice(idx,answer){
choices.push({id:islands[idx].id,answer,timeMs:Date.now()-choiceStartTime,source:islands[idx].source});
playTone(answer==='sì'?200:120,0.2);
vibrate(answer==='sì'?30:15);
document.getElementById(`island-${idx}`).classList.remove('active');
const next=idx+1;
if(next<islands.length){
crossOcean(islands[idx].color,islands[next].color,()=>showIsland(next));
}else{
setTimeout(()=>showIsland(next),600);
}
}

// === CONFRONTATION ===
function showConfrontation(){
document.getElementById('phase1').classList.remove('active');
document.getElementById('phase2').classList.add('active');
document.getElementById('persistentWord').style.color='rgba(200,190,180,0.15)';
const ct=document.getElementById('confrontContent');ct.innerHTML='';

const storedName = getData().nome || null;
const title=mk('div','cblock ctitle', storedName ? `Il tuo arcipelago, ${storedName}.` : 'Il tuo arcipelago.');
ct.appendChild(title);show(title,300);

const mapBlock=mk('div','cblock');
const map=document.createElement('div');map.className='choice-map';
choices.forEach(ch=>{
const isl=islands.find(i=>i.id===ch.id);const c=isl.color;
const rec=mk('div','choice-record');
rec.innerHTML=`<div class="cr-dot" style="background:rgba(${c[0]},${c[1]},${c[2]},0.7)"></div>`+
`<div class="cr-source">${ch.source}</div>`+
`<div class="cr-answer ${ch.answer==='sì'?'yes':'no'}">${ch.answer}</div>`;
map.appendChild(rec);
});
mapBlock.appendChild(map);ct.appendChild(mapBlock);show(mapBlock,1200);

const yC=choices.filter(c=>c.answer==='sì').length;
const nC=choices.filter(c=>c.answer==='no').length;
const fastest=choices.reduce((a,b)=>a.timeMs<b.timeMs?a:b);
const slowest=choices.reduce((a,b)=>a.timeMs>b.timeMs?a:b);

const stats=mk('div','cblock ctext');
stats.innerHTML=`<em>${yC}</em> sì. <em>${nC}</em> no.<br><br>`+
`Risposta più veloce: <em>${(fastest.timeMs/1000).toFixed(1)}s</em>, ${islands.find(i=>i.id===fastest.id).source}.<br>`+
`Più lenta: <em>${(slowest.timeMs/1000).toFixed(1)}s</em>, ${islands.find(i=>i.id===slowest.id).source}.`;
ct.appendChild(stats);show(stats,2800);

const arch=mk('div','cblock ctext');
arch.innerHTML=`Ogni isola usava la stessa parola. <em>${WORD}</em>. In ognuna significava qualcosa di diverso. In ognuna aveva ragione.`;
ct.appendChild(arch);show(arch,4500);

const btn=mk('div','cblock');
const b=document.createElement('div');b.className='tap-btn';b.style.display='inline-block';b.textContent='continua';
b.onclick=showCost;btn.appendChild(b);ct.appendChild(btn);show(btn,6000);
document.getElementById('phase2').scrollTop=0;
}

// === THE COST ===
function showCost(){
document.getElementById('phase2').classList.remove('active');
document.getElementById('phase3').classList.add('active');

const ct=document.getElementById('costContent');ct.innerHTML='';
const fastestYes=choices.filter(c=>c.answer==='sì').sort((a,b)=>a.timeMs-b.timeMs)[0];
const target=fastestYes||choices.filter(c=>c.answer==='no').sort((a,b)=>b.timeMs-a.timeMs)[0];
const isl=islands.find(i=>i.id===target.id);
const c=isl.color;

// Tremble the persistent word
const pw=document.getElementById('persistentWord');
pw.style.color=`rgba(${c[0]},${c[1]},${c[2]},0.35)`;
pw.classList.add('tremble');
setTimeout(()=>pw.classList.remove('tremble'),400);

let introHtml;
if(fastestYes){
introHtml=`Hai detto sì in <em>${(target.timeMs/1000).toFixed(1)} secondi</em>. Questa è la libertà che hai difeso più in fretta.`;
}else{
introHtml=`Hai detto no a tutto. Ma su questa isola hai esitato <em>${(target.timeMs/1000).toFixed(1)} secondi</em>.`;
}
const intro=mk('div','cblock ctext');intro.innerHTML=introHtml;
ct.appendChild(intro);show(intro,500);

const recall=mk('div','cblock');
recall.innerHTML=`<div style="font-family:'${isl.font}',serif;color:rgba(${c[0]},${c[1]},${c[2]},0.65);font-size:0.9rem;line-height:2.2;margin-bottom:0.8rem">${isl.text}</div>`+
`<div style="font-family:'Space Mono',monospace;font-size:0.45rem;letter-spacing:0.2em;color:rgba(${c[0]},${c[1]},${c[2]},0.25);text-transform:uppercase">${isl.source}</div>`;
ct.appendChild(recall);show(recall,2500);

const question=mk('div','cblock');
question.innerHTML=`<div style="font-family:'Cormorant Garamond',serif;font-size:clamp(1.2rem,3vw,1.5rem);font-weight:300;font-style:italic;color:rgba(${c[0]},${c[1]},${c[2]},0.6);line-height:1.8">Per difendere questa libertà, cosa sei disposto a fare?</div>`;
ct.appendChild(question);show(question,4500);

// Typewriter cost
const costBlock=mk('div','cblock');
const costBox=document.createElement('div');
costBox.style.cssText=`padding:1.5rem;border:1px solid rgba(${c[0]},${c[1]},${c[2]},0.12);margin-bottom:1rem`;
const costText=document.createElement('div');costText.className='typewriter';
costText.style.cssText=`font-size:0.85rem;line-height:2.4;color:rgba(${c[0]},${c[1]},${c[2]},0.7)`;
costBox.appendChild(costText);costBlock.appendChild(costBox);ct.appendChild(costBlock);

setTimeout(()=>{
costBlock.classList.add('visible');
vibrate([40,20,40,20,80]);
typewrite(costText,isl.cost,35,()=>{
// Show buttons after typewriter finishes
setTimeout(()=>showCostButtons(ct,isl,c),800);
});
},6500);

// Audio: low drone
playPad(35+c[0]*0.2,12,0.02);
document.getElementById('phase3').scrollTop=0;
}

function typewrite(el,text,speed,callback){
el.innerHTML='';
const chars=text.split('');
chars.forEach((ch,i)=>{
const span=document.createElement('span');span.className='char';span.textContent=ch;
el.appendChild(span);
setTimeout(()=>{span.classList.add('visible');if(i===chars.length-1&&callback)setTimeout(callback,300)},i*speed);
});
}

function showCostButtons(ct,isl,c){
const btnsBlock=mk('div','cblock');
btnsBlock.style.display='flex';btnsBlock.style.justifyContent='center';btnsBlock.style.gap='1.5rem';btnsBlock.style.flexWrap='wrap';

// HOLD to accept
const holdC=document.createElement('div');holdC.className='hold-container';
const holdBtn=document.createElement('div');holdBtn.className='hold-btn';
holdBtn.style.color=`rgba(${c[0]},${c[1]},${c[2]},0.5)`;
holdBtn.style.borderColor=`rgba(${c[0]},${c[1]},${c[2]},0.2)`;
holdBtn.textContent='accetto il costo';
const fill=document.createElement('div');fill.className='hold-fill';
fill.style.background=`rgba(${c[0]},${c[1]},${c[2]},0.08)`;
holdBtn.appendChild(fill);
const label=document.createElement('div');label.className='hold-label';
label.textContent='tieni premuto 3 secondi';
holdC.appendChild(holdBtn);holdC.appendChild(label);

let holdStart=0,holdInterval=null,completed=false;
function startHold(e){
if(completed)return;e.preventDefault();holdStart=Date.now();
holdInterval=setInterval(()=>{
const p=Math.min(((Date.now()-holdStart)/3000)*100,100);
fill.style.width=p+'%';
if(p>=100&&!completed){completed=true;clearInterval(holdInterval);
vibrate(100);playTone(isl.note||60,0.5,0.04);
setTimeout(()=>showAfter(isl,'accept'),500)}
},30);
}
function endHold(){if(completed)return;clearInterval(holdInterval);fill.style.width='0%';holdStart=0}
holdBtn.addEventListener('mousedown',startHold);holdBtn.addEventListener('touchstart',startHold);
holdBtn.addEventListener('mouseup',endHold);holdBtn.addEventListener('mouseleave',endHold);
holdBtn.addEventListener('touchend',endHold);holdBtn.addEventListener('touchcancel',endHold);

// TAP to withdraw
const tapBtn=document.createElement('div');tapBtn.className='tap-btn';
tapBtn.textContent='ritiro il consenso';
tapBtn.onclick=()=>{if(!completed){completed=true;playTone(80,0.3,0.02);setTimeout(()=>showAfter(isl,'withdraw'),300)}};

btnsBlock.appendChild(holdC);btnsBlock.appendChild(tapBtn);
ct.appendChild(btnsBlock);show(btnsBlock,0);
}

// === AFTER ===
function showAfter(targetIsland,decision){
costDecision=decision;
document.getElementById('phase3').classList.remove('active');
document.getElementById('phase4').classList.add('active');
const ct=document.getElementById('afterContent');ct.innerHTML='';
const c=targetIsland.color;

// 3 seconds of silence with pulsing color
ct.style.background='#050506';
const silenceGlow=mk('div','');
silenceGlow.style.cssText=`position:fixed;inset:0;pointer-events:none;
background:radial-gradient(ellipse at 50% 50%,rgba(${c[0]},${c[1]},${c[2]},0.03) 0%,transparent 60%);
animation:silencePulse 3s ease-in-out;opacity:0`;
silenceGlow.innerHTML=`<style>@keyframes silencePulse{0%{opacity:0}50%{opacity:1}100%{opacity:0}}</style>`;
document.getElementById('phase4').appendChild(silenceGlow);

setTimeout(()=>{
silenceGlow.remove();

if(decision==='accept'){
const t1=mk('div','ablock atext','Hai accettato il costo.');
ct.appendChild(t1);show(t1,0);
const t2=mk('div','ablock atext');
t2.innerHTML='La maggior parte delle persone non lo fa. La maggior parte dice di credere in qualcosa e poi si ferma davanti al prezzo.';
ct.appendChild(t2);show(t2,2000);
}else{
const t1=mk('div','ablock atext','Hai ritirato il consenso.');
ct.appendChild(t1);show(t1,0);
const t2=mk('div','ablock atext');
t2.innerHTML=`Eri d\u2019accordo finché non hai visto il prezzo. <em>${WORD}</em> è bellissima finché è astratta. Diventa insopportabile quando qualcuno deve pagarne le conseguenze.`;
ct.appendChild(t2);show(t2,2000);
}

// Expanded text arrives on its own
const exp=mk('div','ablock');
exp.innerHTML=`<div class="a-expanded" style="font-family:'${targetIsland.font}',serif;color:rgba(${c[0]},${c[1]},${c[2]},0.6)">${targetIsland.expanded}</div>`;
ct.appendChild(exp);show(exp,4500);

const coda=mk('div','ablock atext');
if(decision==='accept'){
coda.innerHTML='Ogni libertà ha un prezzo che qualcuno paga. Saperlo è il minimo. Accettarlo è un\u2019altra cosa.';
}else{
coda.innerHTML='Ritirare il consenso di fronte al costo non è viltà. È la scoperta che ogni parola contiene un mondo, e che i mondi hanno un prezzo.';
}
ct.appendChild(coda);show(coda,7500);

// Auto-continue: duration based on average choice speed
const avgTime=choices.reduce((s,c)=>s+c.timeMs,0)/choices.length;
const waitTime=Math.max(5000,Math.min(avgTime*3,15000));
setTimeout(showDefinition,7500+waitTime);

},3000); // 3s silence

document.getElementById('phase4').scrollTop=0;
playPad(55,10,0.02);
}

// === YOUR DEFINITION ===
let userDefinition = '';

function showDefinition(){
document.getElementById('phase4').classList.remove('active');
document.getElementById('phase4b').classList.add('active');
playPad(65,8,0.02);
setTimeout(()=>document.getElementById('defPrompt').classList.add('visible'),500);
setTimeout(()=>{document.getElementById('defInput').classList.add('visible');document.getElementById('defInput').focus()},2000);
setTimeout(()=>document.getElementById('defSubmit').classList.add('visible'),3000);
}

document.getElementById('defSubmit').onclick = submitDefinition;
document.getElementById('defInput').onkeydown = function(e){ if(e.key==='Enter') submitDefinition() };

function submitDefinition(){
const val = document.getElementById('defInput').value.trim();
if(!val) return;
userDefinition = val;
saveData('innesto4_definizione', val);
playTone(200,0.4,0.03);
vibrate(30);
setTimeout(showFinal, 600);
}

// === FINAL ===
function showFinal(){
document.getElementById('phase4').classList.remove('active');
document.getElementById('phase4b').classList.remove('active');
document.getElementById('phase5').classList.add('active');
document.getElementById('persistentWord').style.opacity='0';

const totalTime=Math.round((Date.now()-sessionStart)/1000);
const mins=Math.floor(totalTime/60),secs=totalTime%60;
const ts=mins>0?`${mins}m ${secs}s`:`${secs}s`;
const yC=choices.filter(c=>c.answer==='sì').length;
const nC=choices.filter(c=>c.answer==='no').length;

let msg=`<em>${WORD}</em>.<br><br>`;
msg+=`${islands.length} isole. ${yC} sì. ${nC} no.<br>${ts} nell'arcipelago.<br><br>`;
if(costDecision==='accept') msg+=`Hai accettato il costo della tua libertà.<br>`;
else msg+=`Hai ritirato il consenso di fronte al costo.<br>`;

if(userDefinition){
msg+=`<br><em>${userDefinition}</em><br><br>`;
msg+=`Questa è la tua isola. Non esisteva prima che tu la scrivessi.<br><br>`;
}

msg+=`Le stesse parole. Mondi diversi.<br>Nessuna terraferma.<br><br>`;
msg+=`Ma l\u2019acqua tra le isole è navigabile.<br>Se accetti di bagnarti.`;

const ft=document.getElementById('finalText');ft.innerHTML=msg;
// Fade in after a beat
setTimeout(()=>ft.classList.add('visible'),800);

// Auto-dissolve based on reading speed
const avgTime=choices.reduce((s,c)=>s+c.timeMs,0)/choices.length;
const dissolveTime=Math.max(8000,Math.min(avgTime*4,20000));
setTimeout(()=>{ft.style.transition='opacity 4s ease';ft.style.opacity='0.15'},dissolveTime);

playPad(45,12,0.02);
saveData('innesto4_completed',true);
saveData('innesto4_choices',choices.map(c=>({id:c.id,answer:c.answer,ms:c.timeMs})));
saveData('innesto4_cost',costDecision);
saveData('innesto4_duration',totalTime);
}

// Util
function mk(tag,cls,text){const e=document.createElement(tag);if(cls)e.className=cls;if(text)e.textContent=text;return e}
function show(el,delay){setTimeout(()=>el.classList.add('visible'),delay)}

// Phase 0
setTimeout(()=>document.getElementById('wordHint').style.opacity='1',3000);
document.getElementById('theWord').onclick=function(){
playTone(180,0.5,0.03);
this.style.letterSpacing='0.6em';this.style.opacity='0.3';
this.style.color='transparent';this.style.textShadow='0 0 40px rgba(200,190,180,0.3)';
setTimeout(()=>{
document.getElementById('phase0').classList.remove('active');
document.getElementById('phase1').classList.add('active');
document.getElementById('persistentWord').classList.add('visible');
showIsland(0);
},1200);
};
</script>
</body>
</html>
