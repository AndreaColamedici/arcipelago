<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Attrattori</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap');

:root {
  --bg: #08080a;
  --text: #a8a4a0;
  --text-bright: #d0ccc4;
  --text-dim: #5a5a64;
  --text-ghost: #3a3a44;
  --accent: rgba(200,180,160,0.4);
}

*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-text-size-adjust:100%}

body{
  min-height:100vh;min-height:100dvh;
  background:var(--bg);color:var(--text);
  font-family:'IBM Plex Mono',monospace;font-weight:300;
  line-height:2;overflow:hidden;
  -webkit-font-smoothing:antialiased;
  touch-action:none;user-select:none;-webkit-user-select:none;
}

canvas#ocean{position:fixed;inset:0;width:100%;height:100%;z-index:0}

.phase{
  position:fixed;inset:0;z-index:10;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity 1.5s ease;
}
.phase.active{opacity:1;pointer-events:auto}

#phase-word{z-index:20}

.word-display{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2.8rem,8vw,5rem);font-weight:300;
  color:var(--text-bright);letter-spacing:.05em;
  cursor:pointer;position:relative;
  transition:all 1.5s cubic-bezier(.4,0,.2,1);
}
.word-display::after{
  content:'';position:absolute;bottom:-4px;left:0;right:0;height:1px;
  background:var(--accent);transform:scaleX(0);transition:transform .6s ease;
}
.word-display:hover::after{transform:scaleX(1)}

.word-hint{
  margin-top:2rem;font-size:.7rem;color:var(--text-ghost);
  letter-spacing:.2em;text-transform:uppercase;
  opacity:0;transition:opacity 1s ease 2s;
}
#phase-word.active .word-hint{opacity:1}

.island-overlay{
  position:fixed;inset:0;z-index:30;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;transition:opacity .8s ease;
}
.island-overlay.visible{opacity:1}

.island-inner{max-width:460px;padding:2rem;text-align:center}

.island-voice{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.05rem,2.5vw,1.25rem);font-weight:300;
  line-height:2.1;color:var(--text-bright);
  opacity:0;transform:translateY(15px);transition:all 1.2s ease;
}
.island-voice.visible{opacity:1;transform:translateY(0)}

.island-source{
  font-family:'IBM Plex Mono',monospace;font-size:.6rem;
  color:var(--text-ghost);letter-spacing:.15em;margin-top:1.5rem;
  opacity:0;transition:opacity 1s ease .5s;
}
.island-source.visible{opacity:1}

.nav-hint{
  position:fixed;bottom:3rem;left:50%;transform:translateX(-50%);
  font-size:.55rem;color:var(--text-ghost);letter-spacing:.2em;
  text-transform:uppercase;z-index:40;opacity:0;transition:opacity .5s ease;pointer-events:none;
}
.nav-hint.visible{opacity:1}

.island-counter{
  position:fixed;top:1.5rem;right:1.5rem;
  font-family:'IBM Plex Mono',monospace;font-size:.55rem;
  color:var(--text-ghost);letter-spacing:.12em;
  z-index:40;opacity:0;transition:opacity .5s ease;
}
.island-counter.visible{opacity:.6}

#phase-reveal{z-index:50;background:var(--bg)}

.reveal-wrap{max-width:440px;padding:2rem;text-align:center}

.reveal-map{width:280px;height:280px;margin:0 auto 2rem;position:relative}
.reveal-map canvas{width:100%;height:100%}

.reveal-p{
  font-family:'IBM Plex Mono',monospace;font-size:.75rem;
  color:var(--text-dim);line-height:2.2;margin-bottom:1.2rem;
  opacity:0;transform:translateY(10px);transition:all 1s ease;
}
.reveal-p.visible{opacity:1;transform:translateY(0)}

.reveal-stat{
  font-family:'IBM Plex Mono',monospace;font-size:.6rem;
  color:var(--text-ghost);letter-spacing:.1em;margin:.5rem 0;
  opacity:0;transition:opacity .8s ease;
}
.reveal-stat.visible{opacity:1}
.reveal-stat em{color:var(--text-bright);font-style:normal}

#phase-unseen{z-index:55;background:var(--bg)}
.unseen-wrap{max-width:480px;padding:2rem;text-align:center}

.unseen-intro{
  font-family:'IBM Plex Mono',monospace;font-size:.8rem;
  color:var(--text-dim);line-height:2;margin-bottom:2rem;
  opacity:0;transition:all 1s ease;
}
.unseen-intro.visible{opacity:1}

.unseen-voice{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.1rem,2.8vw,1.3rem);font-weight:300;
  line-height:2.2;color:var(--text-bright);padding:0 1rem;
  opacity:0;transform:translateY(15px);transition:all 1.5s ease;
}
.unseen-voice.visible{opacity:1;transform:translateY(0)}

.unseen-source{
  font-size:.6rem;color:var(--text-ghost);letter-spacing:.15em;
  margin-top:1.5rem;opacity:0;transition:opacity 1s ease;
}
.unseen-source.visible{opacity:1}

#phase-hope{z-index:60;background:var(--bg)}
.hope-wrap{max-width:500px;padding:2rem;text-align:center}

.hope-p{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1rem,2.5vw,1.2rem);font-weight:300;
  line-height:2.2;color:var(--text);margin-bottom:2rem;
  opacity:0;transform:translateY(15px);transition:all 1.5s ease;
}
.hope-p.visible{opacity:1;transform:translateY(0)}
.hope-em{color:var(--text-bright);font-style:italic}

.hope-link{
  display:inline-block;margin-top:2rem;
  font-family:'IBM Plex Mono',monospace;font-size:.6rem;
  letter-spacing:.2em;text-transform:uppercase;
  color:var(--text-ghost);text-decoration:none;
  padding:.7rem 2rem;border:1px solid rgba(255,255,255,.06);
  transition:all .5s ease;opacity:0;
}
.hope-link.visible{opacity:1}
.hope-link:hover{color:var(--text);border-color:var(--text-ghost)}

.cbtn{
  margin-top:2rem;font-family:'IBM Plex Mono',monospace;font-size:.6rem;
  color:var(--text-ghost);letter-spacing:.15em;cursor:pointer;
  padding:.6rem 1.5rem;border:1px solid var(--text-ghost);
  transition:all .3s ease;opacity:0;
}
.cbtn.visible{opacity:1}
.cbtn:hover{color:var(--text);border-color:var(--text)}

.tflash{
  position:fixed;inset:0;z-index:100;background:var(--bg);
  opacity:0;pointer-events:none;transition:opacity .4s ease;
}
.tflash.on{opacity:1}

@media(max-width:600px){html{font-size:15px}}
</style>
</head>
<body>
<canvas id="ocean"></canvas>
<div class="tflash" id="fl"></div>

<div class="phase active" id="phase-word">
  <div class="word-display" id="theWord">libertà</div>
  <div class="word-hint">tocca la parola</div>
</div>

<div class="phase" id="phase-archipelago">
  <div class="island-overlay" id="islandOv">
    <div class="island-inner">
      <div class="island-voice" id="iVoice"></div>
      <div class="island-source" id="iSource"></div>
    </div>
  </div>
</div>
<div class="nav-hint" id="navHint">trascina per navigare</div>
<div class="island-counter" id="iCount"></div>

<div class="phase" id="phase-reveal">
  <div class="reveal-wrap">
    <div class="reveal-map"><canvas id="revCanvas"></canvas></div>
    <div class="reveal-p" id="revText"></div>
    <div class="reveal-stat" id="rs1"></div>
    <div class="reveal-stat" id="rs2"></div>
    <div class="reveal-stat" id="rs3"></div>
    <div class="cbtn" id="revBtn">continua</div>
  </div>
</div>

<div class="phase" id="phase-unseen">
  <div class="unseen-wrap">
    <div class="unseen-intro" id="uIntro"></div>
    <div class="unseen-voice" id="uVoice"></div>
    <div class="unseen-source" id="uSource"></div>
    <div class="cbtn" id="uBtn">prosegui</div>
  </div>
</div>

<div class="phase" id="phase-hope">
  <div class="hope-wrap">
    <div class="hope-p" id="hp1"></div>
    <div class="hope-p" id="hp2"></div>
    <div class="hope-p" id="hp3"></div>
    <a class="hope-link" id="hLink" href="../">torna all'arcipelago</a>
  </div>
</div>

<script>
const SK='arcipelago_realta';
const gd=()=>{try{return JSON.parse(localStorage.getItem(SK)||'{}')}catch{return{}}};
const sd=(k,v)=>{const d=gd();d[k]=v;d.lastVisit=Date.now();d.visitedInnesti=d.visitedInnesti||[];if(!d.visitedInnesti.includes(4))d.visitedInnesti.push(4);localStorage.setItem(SK,JSON.stringify(d))};
const nome=gd().nome||null;
const t0=Date.now();

const words=['libertà','sicurezza','famiglia','progresso','natura'];
const cw=words[Math.floor(Math.random()*words.length)];
document.getElementById('theWord').textContent=cw;

const A={
'libertà':[
{id:'armi',c:[180,140,120],v:'La libertà è poter difendere la mia famiglia senza chiedere il permesso allo Stato. Quando mi tolgono il diritto di possedere un\u2019arma mi tolgono il diritto di esistere come individuo sovrano. Tutto il resto viene dopo.',s:'Forum di discussione, Texas, 2024'},
{id:'corpo',c:[140,120,170],v:'Il mio corpo non è una questione politica. La libertà comincia dove finisce la pretesa di qualcun altro di decidere cosa posso fare con la mia carne, il mio utero, il mio sangue. Chi legifera sul corpo altrui non sta proteggendo nessuno.',s:'Lettera aperta, Milano, 2023'},
{id:'mercato',c:[120,160,140],v:'La libertà è un meccanismo di prezzo. Ogni regolamentazione è una distorsione. Ogni tassa è una coercizione. Il mercato libero è l\u2019unico sistema che permette a ciascuno di perseguire il proprio interesse senza danneggiare gli altri.',s:'Policy paper, Londra, 2024'},
{id:'fuga',c:[160,140,100],v:'Sono partita di notte con mio figlio. Non avevamo documenti. La libertà per me è una porta aperta. Una porta qualsiasi. Chiunque parli di libertà senza aver mai provato a non averla sta parlando di un\u2019altra cosa.',s:'Testimonianza raccolta, Lampedusa, 2023'},
{id:'rete',c:[130,150,180],v:'La vera libertà oggi è l\u2019anonimato. È poter navigare senza che ogni clic venga registrato, venduto, trasformato in previsione. Le persone che dicono di non aver nulla da nascondere non hanno mai pensato a cosa significa essere trasparenti davanti a chi è opaco.',s:'Post criptato, rete Tor, 2024'},
{id:'cura',c:[170,130,150],v:'La libertà non è assenza di vincoli. È avere qualcuno che ti tiene quando cadi. Un sistema sanitario che non ti chiede la carta di credito prima di salvarti la vita. La libertà senza cura è abbandono con un nome più nobile.',s:'Discorso, Copenaghen, 2024'}
],
'sicurezza':[
{id:'muri',c:[160,130,110],v:'La sicurezza è sapere chi entra nel tuo paese. Non è razzismo: è buon senso. Chiudi a chiave la porta di casa la sera, e nessuno ti chiama fascista. Perché uno Stato dovrebbe essere diverso?',s:'Commento radiofonico, Roma, 2024'},
{id:'reddito',c:[130,150,160],v:'Mi sento sicura quando so che se perdo il lavoro non perdo anche la casa. La sicurezza è un pavimento sotto i piedi. Chi non ha mai rischiato di cadere non sa che il pavimento è una scelta politica.',s:'Intervista, Berlino, 2023'},
{id:'sorveglianza',c:[140,120,150],v:'Le telecamere mi fanno sentire protetto. Se non fai niente di male, di cosa hai paura? La privacy è un lusso che non possiamo più permetterci.',s:'Sondaggio d\u2019opinione, Pechino, 2024'},
{id:'clima',c:[120,160,130],v:'L\u2019unica vera sicurezza è un pianeta abitabile. Ogni discussione su muri o telecamere è irrilevante se tra trent\u2019anni il mare avrà sommerso le città dove li costruiamo. La sicurezza è tempo geologico.',s:'Assemblea, Tuvalu, 2024'},
{id:'armi_s',c:[170,130,120],v:'Porto un\u2019arma perché la polizia arriva in otto minuti. Otto minuti sono un\u2019eternità. La mia sicurezza non può dipendere da un numero di telefono. Dipende da me, adesso, qui.',s:'Testimonianza, Atlanta, 2024'},
{id:'psiche',c:[150,140,170],v:'Sicurezza è poter camminare per strada senza che nessuno ti gridi niente. È uno spazio dove il tuo corpo non è una provocazione. Le persone che si sentono al sicuro ovunque non sanno che la sicurezza è un privilegio che si indossa come un vestito invisibile.',s:'Diario, Istanbul, 2023'}
],
'famiglia':[
{id:'tradizione',c:[170,140,110],v:'La famiglia è un uomo e una donna che crescono i figli che hanno generato. Tutto il resto è legittimo, ma è un\u2019altra cosa. Chiamarla con lo stesso nome non la rende uguale. Le parole esistono per distinguere.',s:'Omelia, Verona, 2023'},
{id:'arcobaleno',c:[140,130,170],v:'La mia famiglia è mia figlia, mia moglie, e il fatto che lo Stato ci consideri estranee. La famiglia è dove qualcuno ti aspetta a cena sapendo il tuo nome. Tutto il resto è burocrazia travestita da natura.',s:'Intervista, Amsterdam, 2024'},
{id:'solitudine',c:[130,140,150],v:'Non ho una famiglia. Non ne ho mai voluta una. La solitudine non è un\u2019assenza: è uno spazio che ho scelto. La domanda "e la famiglia?" è la domanda di chi non riesce a immaginare che qualcuno possa bastare a sé stesso.',s:'Saggio, Tokyo, 2024'},
{id:'clan',c:[160,140,120],v:'La famiglia è il villaggio intero. Mia madre ha quindici sorelle e ognuna è mia madre. I vostri nuclei familiari da tre persone mi sembrano prigioni. Come fate a respirare in così pochi?',s:'Conversazione, Dakar, 2023'},
{id:'violenza',c:[150,120,130],v:'La famiglia è il luogo più pericoloso che conosco. Quattro mura, una porta chiusa, e nessuno che sente. Chi idealizza la famiglia non ha mai dovuto scapparne.',s:'Deposizione, Napoli, 2024'},
{id:'distanza',c:[130,150,140],v:'Mia famiglia è a seimila chilometri. Mando soldi ogni mese. Vedo mio figlio in un rettangolo luminoso. La famiglia è ciò che resta quando il corpo non può più essere presente. A volte resta tutto.',s:'Messaggio vocale, Doha, 2024'}
],
'progresso':[
{id:'tech',c:[130,150,170],v:'Il progresso è che mia nonna è morta di parto e mia figlia partorirà con un\u2019intelligenza artificiale che monitora ogni battito. Chi romanticizza il passato non ha mai seppellito qualcuno per un\u2019infezione curabile.',s:'Post, San Francisco, 2024'},
{id:'decrescita',c:[140,160,130],v:'Ogni tonnellata di progresso è una tonnellata di CO\u2082. Ogni innovazione è un\u2019estrazione. Il progresso è la storia che il Nord racconta a sé stesso mentre il Sud paga il conto. L\u2019unico vero progresso è fermarsi.',s:'Manifesto, La Paz, 2024'},
{id:'automazione',c:[160,130,140],v:'Il mio lavoro non esiste più. Una macchina lo fa meglio di me, in meno tempo, senza stipendio. Mi hanno detto di reinventarmi. Come se un uomo di cinquantadue anni fosse una startup.',s:'Lettera al giornale, Detroit, 2023'},
{id:'diritti',c:[140,140,160],v:'Il progresso è che mio nonno non poteva votare e io posso candidarmi. È lento, è incompleto, è pieno di contraddizioni. Ma chi dice che non esiste non ha mai guardato indietro abbastanza.',s:'Discorso di laurea, Johannesburg, 2024'},
{id:'coloniale',c:[170,140,120],v:'Il vostro progresso è arrivato sulle nostre navi negriere. Ogni ferrovia che avete costruito passava sopra qualcuno. Non rifiuto il progresso: rifiuto l\u2019amnesia che lo accompagna.',s:'Lectio magistralis, Accra, 2024'},
{id:'singolarita',c:[150,140,170],v:'Tra quindici anni un\u2019intelligenza artificiale supererà ogni capacità umana. Questo è il progresso: qualcosa che non controlliamo, che non comprendiamo, che potrebbe renderci obsoleti o immortali. Nessuno sa quale delle due.',s:'Conferenza, Shenzhen, 2024'}
],
'natura':[
{id:'wilderness',c:[120,160,130],v:'La natura è ciò che esiste senza il nostro permesso. La foresta non ha bisogno del nostro consenso per crescere. Noi abbiamo bisogno di lei. Il contrario non è vero.',s:'Guida forestale, British Columbia, 2024'},
{id:'naturale',c:[170,140,120],v:'Quando dicono "è contro natura" intendono "è contro la mia idea di natura". La natura è anche il virus, la mutazione, il maschio di cavalluccio marino che partorisce. La natura non ha opinioni morali. Le abbiamo noi.',s:'Editoriale, Berlino, 2024'},
{id:'cibo',c:[160,150,120],v:'Mangio solo cose naturali. Niente chimica, niente OGM, niente additivi. Lo so che suona privilegiato. Ma il mio corpo è l\u2019unico posto dove posso ancora decidere cosa entra e cosa no.',s:'Blog, Portland, 2023'},
{id:'estrattivismo',c:[140,130,150],v:'Sotto la foresta c\u2019è litio. Il litio serve per le batterie. Le batterie servono per le auto elettriche. Le auto elettriche servono per salvare la natura. Per salvare la natura bisogna distruggere la foresta.',s:'Reportage, Atacama, 2024'},
{id:'sacro',c:[150,140,160],v:'La montagna non è una risorsa. È mia nonna. È il luogo dove i morti riposano e i vivi chiedono consiglio. Voi chiamate "natura" quello che noi chiamiamo "famiglia". Quando la distruggete, state uccidendo qualcuno.',s:'Dichiarazione, Amazzonia, 2024'},
{id:'artificiale',c:[130,150,160],v:'La distinzione tra naturale e artificiale è essa stessa artificiale. Un alveare è naturale, un palazzo no? Il linguaggio è naturale, l\u2019intelligenza artificiale no? Il confine si sposta ogni volta che abbiamo bisogno che si sposti.',s:'Lezione, MIT, 2024'}
]
};

const islands=A[cw];

const cv=document.getElementById('ocean'),cx=cv.getContext('2d');
let W,H;
let camX=0,camY=0,tCamX=0,tCamY=0;
let dragging=false,dsx=0,dsy=0,csx=0,csy=0;
let phase=0,activeIsl=-1;
let visited=[],vTimes={},traj=[],lastTrajT=0,archT0=0;

const IR=350;
const iPos=[];
for(let i=0;i<islands.length;i++){
  const a=(i/islands.length)*Math.PI*2-Math.PI/2;
  const r=IR+(Math.random()-.5)*80;
  iPos.push({x:Math.cos(a)*r,y:Math.sin(a)*r,r:55+Math.random()*20,ph:Math.random()*Math.PI*2,dx:(Math.random()-.5)*.08,dy:(Math.random()-.5)*.06});
}

const wp=[];
for(let i=0;i<140;i++)wp.push({x:(Math.random()-.5)*2400,y:(Math.random()-.5)*2400,sz:.5+Math.random()*1.5,a:.04+Math.random()*.12,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,ph:Math.random()*Math.PI*2});

function rz(){W=cv.width=innerWidth;H=cv.height=innerHeight}
rz();addEventListener('resize',rz);

let t=0;

function draw(){
  t+=.008;
  cx.fillStyle='#08080a';cx.fillRect(0,0,W,H);
  camX+=(tCamX-camX)*.06;camY+=(tCamY-camY)*.06;
  const ox=W/2-camX,oy=H/2-camY;
  for(const p of wp){
    p.x+=p.vx+Math.sin(t+p.ph)*.04;p.y+=p.vy+Math.cos(t*.7+p.ph)*.03;
    const sx=p.x+ox,sy=p.y+oy;
    if(sx>-50&&sx<W+50&&sy>-50&&sy<H+50){
      cx.beginPath();cx.arc(sx,sy,p.sz,0,Math.PI*2);
      cx.fillStyle=`rgba(150,145,140,${p.a*(0.7+Math.sin(t+p.ph)*.3)})`;cx.fill();
    }
  }
  if(phase===1){
    for(let i=0;i<islands.length;i++){
      const ip=iPos[i],isl=islands[i];
      ip.x+=ip.dx;ip.y+=ip.dy;
      const sx=ip.x+ox,sy=ip.y+oy;
      const br=1+Math.sin(t*.8+ip.ph)*.06;const r=ip.r*br;
      const[cr,cg,cb]=isl.c;
      const isV=visited.includes(i),isA=activeIsl===i;
      const ba=isA?.25:(isV?.12:.07);
      let g1=cx.createRadialGradient(sx,sy,0,sx,sy,r*2.2);
      g1.addColorStop(0,`rgba(${cr},${cg},${cb},${ba*1.5})`);
      g1.addColorStop(.4,`rgba(${cr},${cg},${cb},${ba*.7})`);
      g1.addColorStop(1,`rgba(${cr},${cg},${cb},0)`);
      cx.fillStyle=g1;cx.beginPath();cx.arc(sx,sy,r*2.2,0,Math.PI*2);cx.fill();
      let g2=cx.createRadialGradient(sx,sy,0,sx,sy,r);
      g2.addColorStop(0,`rgba(${cr},${cg},${cb},${ba*2.5})`);
      g2.addColorStop(.6,`rgba(${cr},${cg},${cb},${ba})`);
      g2.addColorStop(1,`rgba(${cr},${cg},${cb},0)`);
      cx.fillStyle=g2;cx.beginPath();cx.arc(sx,sy,r,0,Math.PI*2);cx.fill();
      if(isA){cx.strokeStyle=`rgba(${cr},${cg},${cb},.25)`;cx.lineWidth=1;cx.beginPath();cx.arc(sx,sy,r*1.4+Math.sin(t*2)*5,0,Math.PI*2);cx.stroke()}
    }
    if(traj.length>1){
      cx.strokeStyle='rgba(200,180,160,.06)';cx.lineWidth=1;cx.beginPath();
      for(let i=0;i<traj.length;i++){const p=traj[i];if(i===0)cx.moveTo(p.x+ox,p.y+oy);else cx.lineTo(p.x+ox,p.y+oy)}
      cx.stroke();
    }
  }
  requestAnimationFrame(draw);
}
draw();

cv.addEventListener('touchstart',e=>{if(phase!==1)return;e.preventDefault();const tt=e.touches[0];dragging=true;dsx=tt.clientX;dsy=tt.clientY;csx=tCamX;csy=tCamY},{passive:false});
cv.addEventListener('touchmove',e=>{if(!dragging||phase!==1)return;e.preventDefault();const tt=e.touches[0];tCamX=csx-(tt.clientX-dsx);tCamY=csy-(tt.clientY-dsy)},{passive:false});
cv.addEventListener('touchend',()=>{dragging=false;checkProx()});
cv.addEventListener('mousedown',e=>{if(phase!==1)return;dragging=true;dsx=e.clientX;dsy=e.clientY;csx=tCamX;csy=tCamY});
cv.addEventListener('mousemove',e=>{if(!dragging||phase!==1)return;tCamX=csx-(e.clientX-dsx);tCamY=csy-(e.clientY-dsy)});
cv.addEventListener('mouseup',()=>{dragging=false;checkProx()});

function recTraj(){if(phase!==1)return;const now=Date.now();if(now-lastTrajT>500){traj.push({x:camX,y:camY,t:now});lastTrajT=now}requestAnimationFrame(recTraj)}

function checkProx(){
  let cd=Infinity,ci=-1;
  for(let i=0;i<iPos.length;i++){const ip=iPos[i];const dx=camX-ip.x,dy=camY-ip.y;const d=Math.sqrt(dx*dx+dy*dy);if(d<ip.r*2.2&&d<cd){cd=d;ci=i}}
  if(ci>=0&&ci!==activeIsl)enterIsl(ci);else if(ci<0&&activeIsl>=0)leaveIsl();
}

function contCheck(){if(phase!==1)return;checkProx();requestAnimationFrame(contCheck)}

function enterIsl(i){
  activeIsl=i;const isl=islands[i];
  if(!visited.includes(i)){visited.push(i);vTimes[i]=Date.now()}
  const ov=document.getElementById('islandOv');
  const vo=document.getElementById('iVoice');const so=document.getElementById('iSource');
  vo.classList.remove('visible');so.classList.remove('visible');
  vo.textContent=isl.v;so.textContent=isl.s;ov.classList.add('visible');
  const[r,g,b]=isl.c;
  document.body.style.transition='background-color 2s ease';
  document.body.style.backgroundColor=`rgb(${Math.floor(r*.06)},${Math.floor(g*.06)},${Math.floor(b*.06)})`;
  setTimeout(()=>vo.classList.add('visible'),200);
  setTimeout(()=>so.classList.add('visible'),800);
  const ct=document.getElementById('iCount');ct.textContent=`${visited.length} / ${islands.length}`;ct.classList.add('visible');
  if(visited.length>=islands.length){setTimeout(()=>{if(visited.length>=islands.length)toReveal()},4000)}
}

function leaveIsl(){activeIsl=-1;document.getElementById('islandOv').classList.remove('visible');document.body.style.backgroundColor='#08080a'}

function fl(cb){const f=document.getElementById('fl');f.classList.add('on');setTimeout(()=>{cb();setTimeout(()=>f.classList.remove('on'),600)},400)}

function setP(n){document.querySelectorAll('.phase').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.phase')[n].classList.add('active');phase=n}

document.getElementById('theWord').addEventListener('click',()=>{
  if(phase!==0)return;
  fl(()=>{setP(1);archT0=Date.now();tCamX=0;tCamY=0;recTraj();contCheck();
    setTimeout(()=>{document.getElementById('navHint').classList.add('visible');setTimeout(()=>document.getElementById('navHint').classList.remove('visible'),5000)},1500);
  });
});

function toReveal(){
  leaveIsl();document.getElementById('navHint').classList.remove('visible');document.getElementById('iCount').classList.remove('visible');
  fl(()=>{setP(2);document.body.style.backgroundColor='#08080a';buildReveal()});
}

function buildReveal(){
  const rc=document.getElementById('revCanvas');const rx=rc.getContext('2d');
  rc.width=560;rc.height=560;rx.fillStyle='#0a0a0c';rx.fillRect(0,0,560,560);
  const c=280,s=.6;
  for(let i=0;i<islands.length;i++){
    const ip=iPos[i],[r,g,b]=islands[i].c;const sx=c+ip.x*s,sy=c+ip.y*s;
    const v=visited.includes(i);const a=v?.3:.08;
    const gr=rx.createRadialGradient(sx,sy,0,sx,sy,25);
    gr.addColorStop(0,`rgba(${r},${g},${b},${a})`);gr.addColorStop(1,`rgba(${r},${g},${b},0)`);
    rx.fillStyle=gr;rx.beginPath();rx.arc(sx,sy,25,0,Math.PI*2);rx.fill();
  }
  if(traj.length>1){
    rx.strokeStyle='rgba(200,180,160,.2)';rx.lineWidth=1.5;rx.beginPath();
    for(let i=0;i<traj.length;i++){const p=traj[i];if(i===0)rx.moveTo(c+p.x*s,c+p.y*s);else rx.lineTo(c+p.x*s,c+p.y*s)}
    rx.stroke();const f=traj[0];rx.fillStyle='rgba(200,180,160,.5)';rx.beginPath();rx.arc(c+f.x*s,c+f.y*s,3,0,Math.PI*2);rx.fill();
  }
  const prox=new Array(islands.length).fill(0);
  for(const p of traj){for(let i=0;i<iPos.length;i++){const ip=iPos[i];const dx=p.x-ip.x,dy=p.y-ip.y;if(Math.sqrt(dx*dx+dy*dy)<ip.r*2.5)prox[i]++}}
  let longI=0,longV=0,leastI=0,leastV=Infinity;
  for(let i=0;i<prox.length;i++){if(prox[i]>longV){longV=prox[i];longI=i}if(prox[i]<leastV){leastV=prox[i];leastI=i}}
  window._leastI=leastI;
  const tt=Math.round((Date.now()-archT0)/1000);
  document.getElementById('revText').textContent='Questo è il tuo arcipelago. La parola era una. Le isole erano sei. Hai navigato tra voci che usavano le stesse lettere per dire cose incompatibili. La traiettoria è solo tua. Ma il punto dove ti sei fermato più a lungo racconta qualcosa che forse già sapevi.';
  document.getElementById('rs1').innerHTML=`Tempo nell'arcipelago: <em>${tt} secondi</em>`;
  document.getElementById('rs2').innerHTML=`Isole visitate: <em>${visited.length} su ${islands.length}</em>`;
  if(longI>=0)document.getElementById('rs3').innerHTML=`Gravitazione massima: <em>${islands[longI].s}</em>`;
  setTimeout(()=>document.getElementById('revText').classList.add('visible'),500);
  setTimeout(()=>document.getElementById('rs1').classList.add('visible'),2000);
  setTimeout(()=>document.getElementById('rs2').classList.add('visible'),2800);
  setTimeout(()=>document.getElementById('rs3').classList.add('visible'),3600);
  setTimeout(()=>document.getElementById('revBtn').classList.add('visible'),5000);
  sd('innesto4_word',cw);sd('innesto4_visited',visited.map(i=>islands[i].id));sd('innesto4_time',tt);
}

document.getElementById('revBtn').addEventListener('click',()=>{fl(()=>{setP(3);buildUnseen()})});

function buildUnseen(){
  const i=window._leastI;const isl=islands[i];
  document.getElementById('uIntro').textContent='C\u2019è un\u2019isola dove non sei quasi andato. Il tuo modo di navigare l\u2019ha evitata. Nessun algoritmo ha deciso per te: l\u2019hai fatto tu, con il corpo, con il dito, con qualcosa che sta prima della decisione. Ecco cosa diceva.';
  document.getElementById('uVoice').textContent=isl.v;
  document.getElementById('uSource').textContent=isl.s;
  setTimeout(()=>document.getElementById('uIntro').classList.add('visible'),500);
  setTimeout(()=>document.getElementById('uVoice').classList.add('visible'),2500);
  setTimeout(()=>document.getElementById('uSource').classList.add('visible'),3500);
  setTimeout(()=>document.getElementById('uBtn').classList.add('visible'),5500);
}

document.getElementById('uBtn').addEventListener('click',()=>{fl(()=>{setP(4);buildHope()})});

function buildHope(){
  document.getElementById('hp1').innerHTML='La parola era <span class="hope-em">'+cw+'</span>. Sei isole. Sei mondi che usano le stesse lettere per dire cose che non possono coesistere. Questo è l\u2019arcipelago in cui viviamo. Non c\u2019è terraferma. Non c\u2019è un punto da cui tutte le isole si vedono insieme. Ogni isola crede di essere il continente.';
  document.getElementById('hp2').innerHTML='Ma tu hai appena fatto qualcosa che gli algoritmi non fanno: sei andato su un\u2019isola che non ti somigliava. Hai letto parole che non erano pensate per te. Hai prestato attenzione a una voce che il tuo sistema nervoso voleva scartare. Questa capacità ha un nome antico. Si chiama <span class="hope-em">sorpresa</span>. È la cosa più preziosa che hai.';
  document.getElementById('hp3').innerHTML='Esiste un\u2019intera architettura, là fuori, il cui scopo è togliertela: mostrarti solo le isole dove saresti andato comunque, confermarti ciò che già pensi, farti credere che l\u2019arcipelago sia un continente e che quel continente sia il tuo. <span class="hope-em">Arcipelago delle realtà</span> è la mappa di questa architettura, e il tentativo di attraversare l\u2019acqua.';
  setTimeout(()=>document.getElementById('hp1').classList.add('visible'),500);
  setTimeout(()=>document.getElementById('hp2').classList.add('visible'),3500);
  setTimeout(()=>document.getElementById('hp3').classList.add('visible'),7000);
  setTimeout(()=>document.getElementById('hLink').classList.add('visible'),10000);
  sd('innesto4_completed',true);
}
</script>
</body>
